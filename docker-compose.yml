services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
  
  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning --requirepass senharedis
    volumes:
      - cache:/data

volumes:
  cache:
    driver: local